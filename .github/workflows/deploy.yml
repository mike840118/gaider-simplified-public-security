name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# 1. 必須設定權限，否則部署會失敗
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install
          npm run build

      # 2. 將 build 出來的資料夾 (dist) 上傳為 Artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

      # 3. 將上傳的 Artifact 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
